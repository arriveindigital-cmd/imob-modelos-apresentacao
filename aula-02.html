<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Aula 2 — Como o mercado funciona no digital | Imob In Digital</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
<style>
:root{--bg:#fafaf8;--text:#111;--muted:rgba(17,17,17,.44);--subtle:rgba(17,17,17,.26);--border:rgba(0,0,0,.08);--surface:rgba(0,0,0,.04);--grad:linear-gradient(120deg,#f97316,#e11d48 45%,#7c3aed);--orange:#f97316}
*,::before,::after{box-sizing:border-box;margin:0;padding:0}
body{background:#1a1a1a;display:flex;flex-direction:column;min-height:100vh;align-items:center;justify-content:center;font-family:'Inter',system-ui,sans-serif;overflow:hidden}
#stage{width:min(94vw,1280px,calc((100vh - 64px)*16/9));aspect-ratio:16/9;background:var(--bg);position:relative;overflow:hidden;border-radius:4px;box-shadow:0 24px 64px rgba(0,0,0,.5)}
#stage::after{content:'IMOB IN DIGITAL';position:absolute;bottom:18px;right:22px;font-size:.52rem;font-weight:700;letter-spacing:.14em;color:var(--subtle);pointer-events:none;z-index:10}
.slide{position:absolute;inset:0;display:flex;flex-direction:column;background:var(--bg);opacity:0;transition:opacity .22s;pointer-events:none}
.slide.active{opacity:1;pointer-events:auto}
.pad{flex:1;display:flex;flex-direction:column;padding:5% 6%}
.grad{background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

.s-cover .pad{justify-content:center}
.s-cover .cov-mod{font-size:.6rem;font-weight:700;letter-spacing:.16em;color:var(--muted);text-transform:uppercase;margin-bottom:12px}
.s-cover .cov-rule{width:36px;height:2px;background:var(--grad);border-radius:2px;margin-bottom:20px}
.s-cover h1{font-size:3.4rem;font-weight:800;line-height:1.05;color:var(--text);margin-bottom:14px}
.s-cover .cov-sub{font-size:.95rem;color:var(--muted);max-width:60%;line-height:1.5}

.s-data .pad{justify-content:center}
.s-data .dat-eye{font-size:.6rem;font-weight:700;letter-spacing:.16em;color:var(--muted);text-transform:uppercase;margin-bottom:10px}
.s-data .dat-num{font-size:9rem;font-weight:800;line-height:.88;margin-bottom:10px}
.s-data .dat-lbl{font-size:1.4rem;font-weight:700;color:var(--text);line-height:1.25;margin-bottom:6px;max-width:72%}
.s-data .dat-src{font-size:.62rem;color:var(--subtle);font-weight:500;letter-spacing:.04em;margin-top:14px}
.s-data .dat-list{list-style:none;margin-top:14px;display:flex;flex-direction:column;gap:5px}
.s-data .dat-list li{font-size:.82rem;color:var(--muted);padding-left:12px;position:relative;line-height:1.35}
.s-data .dat-list li::before{content:'—';position:absolute;left:0;color:var(--subtle)}

.s-key .pad{justify-content:center}
.s-key .key-eye{font-size:.6rem;font-weight:700;letter-spacing:.16em;color:var(--muted);text-transform:uppercase;margin-bottom:16px}
.s-key .key-text{font-size:3rem;font-weight:800;line-height:1.1;color:var(--text);margin-bottom:20px;max-width:88%}
.s-key .key-sub{font-size:.9rem;color:var(--muted);max-width:68%;line-height:1.55}

.s-statement .pad{justify-content:center}
.s-statement .st-eye{font-size:.6rem;font-weight:700;letter-spacing:.16em;color:var(--muted);text-transform:uppercase;margin-bottom:10px}
.s-statement h2{font-size:2rem;font-weight:800;color:var(--text);line-height:1.18;margin-bottom:18px;max-width:88%}
.s-statement .st-body{font-size:.95rem;color:var(--muted);line-height:1.6;max-width:72%;margin-bottom:20px}
.s-statement .st-items{display:flex;flex-direction:column;gap:8px}
.s-statement .st-item{display:flex;align-items:flex-start;gap:9px;font-size:.88rem;color:var(--text);font-weight:500;line-height:1.4}
.s-statement .st-dot{width:6px;height:6px;border-radius:50%;background:var(--orange);margin-top:5px;flex-shrink:0}

.s-compare .pad{justify-content:flex-start;padding-top:5%}
.s-compare .cmp-hd{font-size:1.2rem;font-weight:800;color:var(--text);margin-bottom:18px}
.s-compare .cmp-cols{display:grid;grid-template-columns:1fr 1fr;gap:14px;flex:1}
.s-compare .cmp-col{background:var(--surface);border-radius:10px;padding:18px 20px;border:1px solid var(--border);display:flex;flex-direction:column}
.s-compare .cmp-lbl{font-size:.58rem;font-weight:800;letter-spacing:.16em;color:var(--muted);text-transform:uppercase;margin-bottom:8px}
.s-compare .cmp-ttl{font-size:1rem;font-weight:800;color:var(--text);margin-bottom:10px;line-height:1.15}
.s-compare .cmp-items{display:flex;flex-direction:column;gap:5px}
.s-compare .cmp-it{font-size:.78rem;color:var(--muted);padding-left:11px;position:relative;line-height:1.35}
.s-compare .cmp-it::before{content:'';width:4px;height:4px;border-radius:50%;background:rgba(17,17,17,.15);position:absolute;left:0;top:6px}
.s-compare .cmp-note{font-size:.76rem;color:var(--muted);margin-top:14px;font-style:italic}

.s-phases .pad{justify-content:flex-start;padding-top:5%}
.s-phases .ph-ttl{font-size:1.3rem;font-weight:800;color:var(--text);margin-bottom:18px;max-width:82%;line-height:1.2}
.s-phases .ph-cols{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;flex:1}
.s-phases .ph-col{background:var(--surface);border-radius:10px;padding:16px 14px;border:1px solid var(--border)}
.s-phases .ph-n{font-size:.58rem;font-weight:800;letter-spacing:.12em;color:var(--orange);text-transform:uppercase;margin-bottom:7px}
.s-phases .ph-nm{font-size:.95rem;font-weight:800;color:var(--text);margin-bottom:8px}
.s-phases .ph-items{display:flex;flex-direction:column;gap:4px}
.s-phases .ph-it{font-size:.7rem;color:var(--muted);line-height:1.35}

.s-platform .pad{justify-content:flex-start}
.s-platform .plt-ttl{font-size:1.4rem;font-weight:800;color:var(--text);margin-bottom:18px}
.s-platform .plt-rows{display:flex;flex-direction:column;gap:10px}
.s-platform .plt-row{display:flex;align-items:center;gap:12px;background:var(--surface);border-radius:8px;padding:11px 14px;border:1px solid var(--border)}
.s-platform .plt-ph{font-size:.58rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);min-width:52px}
.s-platform .plt-sep{width:1px;height:22px;background:var(--border)}
.s-platform .plt-cnt{flex:1}
.s-platform .plt-chs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:3px}
.s-platform .plt-tag{font-size:.6rem;font-weight:700;background:rgba(249,115,22,.08);color:var(--orange);border:1px solid rgba(249,115,22,.18);border-radius:4px;padding:2px 7px}
.s-platform .plt-dsc{font-size:.7rem;color:var(--muted);line-height:1.3}

.s-insight .pad{justify-content:center}
.s-insight h2{font-size:3rem;font-weight:800;line-height:1.1;margin-bottom:18px;max-width:85%}
.s-insight .ins-note{font-size:.88rem;color:var(--muted);font-weight:500}

#ui{display:flex;align-items:center;gap:6px;padding:8px 0 4px}
#ui button{background:none;border:none;cursor:pointer;font-size:.85rem;color:#ccc;padding:4px 10px;border-radius:4px;transition:color .15s}
#ui button:hover{color:#fff}
#ui button:disabled{opacity:.28;cursor:default}
#counter{font-size:.6rem;color:#888;letter-spacing:.06em;min-width:44px;text-align:center}
</style>
</head>
<body>
<div id="stage"></div>
<div id="ui">
  <button id="prev">&#8592;</button>
  <span id="counter"></span>
  <button id="next">&#8594;</button>
  <button id="fs" title="Tela cheia">⛶</button>
</div>
<script>
const slides = [
  /* 01 */
  {type:'s-cover',module:'Módulo 1 · Aula 2',
   title:'Como o mercado imobiliário funciona no digital',
   sub:'O comprador decide em quatro meses. Você precisa estar presente desde o primeiro dia.'},

  /* 02 */
  {type:'s-data',eyebrow:'DataZAP 2024',num:'4 meses',
   label:'É o tempo médio que um comprador leva pesquisando antes de entrar em contato com um corretor.',
   source:'Maior base de dados do mercado imobiliário brasileiro',
   items:['Não é 4 meses olhando vitrine','É pesquisa ativa: Google, portais, vídeos, perfis','Formando opinião sobre quem sabe o que fala']},

  /* 03 */
  {type:'s-key',eyebrow:'A pergunta que esse módulo existe para responder',
   text:'Durante esses 4 meses, o que esse comprador encontrou quando pesquisou imóvel na sua região?<br><br>Você estava lá?'},

  /* 04 */
  {type:'s-phases',title:'A jornada que ninguém vê',
   phases:[
     {name:'Gatilho',items:['Mudança de vida — filho, separação, crescimento de família','Consciência nova: "preciso mudar minha situação de moradia"','Ainda não pesquisa corretor']},
     {name:'Pesquisa',items:['Pesquisa bairro, financiamento, tipo de imóvel','Forma opinião sobre quem entende do mercado','Conteúdo de qualidade constrói autoridade antes do contato']},
     {name:'Decisão',items:['Afunila: tipo, bairro e faixa de valor definidos','Contata 2 a 5 corretores que pareceram confiáveis','Fecha com quem construiu mais confiança — ou responder primeiro']}]},

  /* 05 */
  {type:'s-statement',
   title:'15% levam mais de 1 ano.',
   body:'A mediana é de 4 meses, mas a jornada pode ser muito mais longa. Ao longo dela, o comprador vai contatar entre 2 e 5 corretores diferentes antes de fechar com alguém.',
   items:['Não fecha com o melhor corretor necessariamente',
          'Fecha com quem construiu mais confiança — ou com quem responder primeiro quando estiver pronto']},

  /* 06 */
  {type:'s-data',eyebrow:'MIT + InsideSales — 100k tentativas de contato, 3 anos',num:'78%',
   label:'dos compradores fecham com quem responde primeiro.',
   source:'Estudo com mais de 100.000 tentativas de contato ao longo de 3 anos'},

  /* 07 */
  {type:'s-data',eyebrow:'Tempo de resposta',num:'21x',
   label:'mais chance de qualificar um lead respondido em menos de 5 minutos.',
   source:'vs. leads respondidos após 30 minutos',
   items:['69% dos leads de portais não recebem resposta em menos de 5 minutos',
          'Quem responde rápido já vence a maioria por default']},

  /* 08 */
  {type:'s-compare',
   left:{label:'Fase 1 — Os 4 meses',title:'Construção de confiança',
     items:['Comprador ainda está pesquisando','Forma opinião sobre quem sabe do mercado','Você precisa aparecer com conteúdo relevante','A maioria dos corretores não joga essa fase']},
   right:{label:'Fase 2 — O momento',title:'Resposta rápida',
     items:['Comprador está pronto para contato','Já escolheu 2 a 3 corretores confiáveis','Fecha com quem responde primeiro','Todos os corretores tentam jogar essa fase']},
   note:'O jogo tem duas fases. A maioria só joga uma.'},

  /* 09 */
  {type:'s-platform',title:'Onde o comprador está em cada fase',
   rows:[
     {phase:'Começo',channels:['Google','YouTube'],
      desc:'Pesquisa bairro, financiamento, tipos de imóvel. Ainda não quer falar com corretor — quer aprender e entender.'},
     {phase:'Meio',channels:['Instagram','ZAP Imóveis','Viva Real'],
      desc:'Afunila: tipo, bairro e faixa definidos. Portais para comparar opções. Instagram para referências e autoridade.'},
     {phase:'Final',channels:['WhatsApp','Formulários'],
      desc:'Pronto para contato. Já escolheu 2 a 3 corretores que pareceram confiáveis — e vai iniciar a conversa.'}]},

  /* 10 */
  {type:'s-statement',
   title:'11 buscas no Google<br>antes de qualquer ação num site imobiliário.',
   body:'E 64% dos compradores assistem pelo menos um vídeo durante a jornada de decisão.',
   items:['Quem aparece com conteúdo que responde essas perguntas constrói autoridade antes do portal',
          'Ele ainda não vai entrar em contato. Mas vai lembrar de quem apareceu e ajudou.',
          '64% que assistem vídeo estão construindo confiança — antes de qualquer lead ser gerado']},

  /* 11 */
  {type:'s-statement',eyebrow:'O problema estrutural do portal',
   title:'O lead do portal chegou até você.<br>Mas chegou até todos os outros também.',
   body:'Você não tem preferência. Você não construiu nenhuma relação antes. A única forma de vencer é responder mais rápido que todos que pagaram o mesmo.',
   items:['R$400 a R$1.000/mês por espaço onde você não tem vantagem de relacionamento',
          '69% dos leads não recebem resposta em menos de 5 minutos',
          'É canal alugado — você não controla nada do que acontece antes do lead chegar']},

  /* 12 */
  {type:'s-compare',
   left:{label:'Portal imobiliário',title:'Canal alugado',
     items:['Lead compartilhado com todos os anunciantes','Sem relação prévia com o comprador','Custo fixo mensal (R$400–R$1.000)','Você compete em igualdade de condições com todos']},
   right:{label:'Presença digital própria',title:'Canal construído',
     items:['Lead que chega já conhece e confia em você','Relação construída durante os 4 meses','Sem custo variável por lead','Você vence por confiança, não por velocidade']}},

  /* 13 */
  {type:'s-statement',eyebrow:'O problema da indicação',
   title:'Para uma indicação acontecer, três coisas precisam ser verdadeiras ao mesmo tempo.',
   items:['Alguém precisa se lembrar de você',
          'Esse alguém precisa conhecer alguém que está buscando imóvel',
          'Esse comprador precisa estar na fase da jornada onde aceita a indicação']},

  /* 14 */
  {type:'s-data',eyebrow:'Mercado imobiliário brasileiro',num:'580 mil',
   label:'corretores registrados — 40% de crescimento em 5 anos.',
   source:'2020: 413 mil · 2025: 580 mil · 2º maior do mundo (atrás dos EUA)',
   items:['Todos disputando atenção do mesmo pool de compradores',
          'Maioria usa os mesmos canais, da mesma forma',
          'Vendas de imóveis novos cresceram 11,8% em 2024 — o problema não é falta de demanda']},

  /* 15 */
  {type:'s-compare',title:'Estratégia digital: corretor vs. imobiliária',
   left:{label:'Corretor autônomo',title:'Construa sua marca pessoal',
     items:['O ativo é você — presença, autoridade, especialização','O comprador que te segue te segue, não à empresa','Ativo que vai com você independente de onde trabalha']},
   right:{label:'Dono de imobiliária',title:'Dois trabalhos simultâneos',
     items:['Posicionar a empresa como marca institucional','Posicionar os corretores como marcas pessoais','Marca pessoal do corretor converte mais — tem calor humano']}},

  /* 16 */
  {type:'s-insight',grad:true,
   text:'O trabalho digital não começa quando o lead está pronto.<br>Começa 4 meses antes.',
   note:'→ Próxima aula: quem é o comprador certo — presença genérica é tão ineficiente quanto nenhuma presença.'}
];

const stage = document.getElementById('stage');
let cur = 0;

function render(s) {
  switch(s.type) {
    case 's-cover':
      return `<div class="pad"><div class="cov-mod">${s.module}</div><div class="cov-rule"></div><h1>${s.title}</h1>${s.sub?`<div class="cov-sub">${s.sub}</div>`:''}</div>`;
    case 's-data': {
      const ns = s.num.length > 4 ? 'style="font-size:5rem;line-height:.9"' : '';
      return `<div class="pad"><div class="dat-eye">${s.eyebrow||''}</div><div class="dat-num grad" ${ns}>${s.num}</div><div class="dat-lbl">${s.label}</div>${s.source?`<div class="dat-src">${s.source}</div>`:''} ${s.items&&s.items.length?`<ul class="dat-list">${s.items.map(i=>`<li>${i}</li>`).join('')}</ul>`:''}</div>`;
    }
    case 's-key':
      return `<div class="pad">${s.eyebrow?`<div class="key-eye">${s.eyebrow}</div>`:''}<div class="key-text">${s.text}</div>${s.sub?`<div class="key-sub">${s.sub}</div>`:''}</div>`;
    case 's-statement':
      return `<div class="pad">${s.eyebrow?`<div class="st-eye">${s.eyebrow}</div>`:''}<h2>${s.title}</h2>${s.body?`<div class="st-body">${s.body}</div>`:''} ${s.items&&s.items.length?`<div class="st-items">${s.items.map(i=>`<div class="st-item"><span class="st-dot"></span><span>${i}</span></div>`).join('')}</div>`:''}</div>`;
    case 's-compare':
      return `<div class="pad">${s.title?`<div class="cmp-hd">${s.title}</div>`:''}<div class="cmp-cols"><div class="cmp-col"><div class="cmp-lbl">${s.left.label}</div><div class="cmp-ttl">${s.left.title}</div><div class="cmp-items">${s.left.items.map(i=>`<div class="cmp-it">${i}</div>`).join('')}</div></div><div class="cmp-col"><div class="cmp-lbl">${s.right.label}</div><div class="cmp-ttl">${s.right.title}</div><div class="cmp-items">${s.right.items.map(i=>`<div class="cmp-it">${i}</div>`).join('')}</div></div></div>${s.note?`<div class="cmp-note">${s.note}</div>`:''}</div>`;
    case 's-phases':
      return `<div class="pad"><div class="ph-ttl">${s.title}</div><div class="ph-cols">${s.phases.map((p,i)=>`<div class="ph-col"><div class="ph-n">Fase ${i+1}</div><div class="ph-nm">${p.name}</div><div class="ph-items">${p.items.map(it=>`<div class="ph-it">· ${it}</div>`).join('')}</div></div>`).join('')}</div></div>`;
    case 's-platform':
      return `<div class="pad">${s.title?`<div class="plt-ttl">${s.title}</div>`:''}<div class="plt-rows">${s.rows.map(r=>`<div class="plt-row"><span class="plt-ph">${r.phase}</span><div class="plt-sep"></div><div class="plt-cnt"><div class="plt-chs">${r.channels.map(c=>`<span class="plt-tag">${c}</span>`).join('')}</div><div class="plt-dsc">${r.desc}</div></div></div>`).join('')}</div></div>`;
    case 's-insight':
      return `<div class="pad"><h2 ${s.grad?'class="grad"':''}>${s.text}</h2>${s.note?`<div class="ins-note">${s.note}</div>`:''}</div>`;
    default:
      return `<div class="pad"><p>${s.type}</p></div>`;
  }
}

slides.forEach(s => {
  const div = document.createElement('div');
  div.className = 'slide ' + s.type;
  div.innerHTML = render(s);
  stage.appendChild(div);
});

const all = stage.querySelectorAll('.slide');
const prevBtn = document.getElementById('prev');
const nextBtn = document.getElementById('next');
const counter = document.getElementById('counter');

function go(n) {
  all[cur].classList.remove('active');
  cur = Math.max(0, Math.min(n, all.length - 1));
  all[cur].classList.add('active');
  prevBtn.disabled = cur === 0;
  nextBtn.disabled = cur === all.length - 1;
  counter.textContent = `${cur + 1} / ${all.length}`;
}

prevBtn.addEventListener('click', () => go(cur - 1));
nextBtn.addEventListener('click', () => go(cur + 1));
document.getElementById('fs').addEventListener('click', () => document.documentElement.requestFullscreen?.());
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') go(cur + 1);
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') go(cur - 1);
  if (e.key === 'f' || e.key === 'F') document.documentElement.requestFullscreen?.();
});

go(0);
</script>
</body>
</html>
