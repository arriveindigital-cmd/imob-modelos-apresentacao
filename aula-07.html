<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Aula 7 · Perfil e bio — sua presença no Instagram</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#fafaf8;--text:#111111;--muted:rgba(17,17,17,.46);--subtle:rgba(17,17,17,.28);--border:rgba(0,0,0,.08);--surface:rgba(0,0,0,.035);--grad:linear-gradient(120deg,#f97316,#e11d48 45%,#7c3aed);--orange:#f97316;}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;background:#e6e5e2;font-family:'Inter',system-ui,sans-serif;overflow:hidden;}
#stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;}
.slide{position:absolute;width:min(94vw,1280px,calc((100vh - 64px)*16/9));aspect-ratio:16/9;background:var(--bg);border-radius:20px;overflow:hidden;opacity:0;transform:scale(.97) translateY(8px);transition:opacity .36s ease,transform .36s ease;pointer-events:none;box-shadow:0 32px 96px rgba(0,0,0,.2),0 2px 8px rgba(0,0,0,.1);color:var(--text);}
.slide.active{opacity:1;transform:scale(1) translateY(0);pointer-events:auto;}
.slide::after{content:'IMOB IN DIGITAL';position:absolute;bottom:20px;right:26px;font-size:.58rem;font-weight:700;letter-spacing:.2em;color:rgba(17,17,17,.18);pointer-events:none;}
.pad{position:absolute;inset:0;padding:6.5% 7.5%;display:flex;flex-direction:column;}
.gradtext{background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
.eyebrow{font-size:.7rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);}
.rule{width:44px;height:3px;background:var(--grad);border-radius:2px;}

/* COVER */
.s-cover{background:radial-gradient(ellipse at 96% 96%,rgba(124,58,237,.055) 0%,transparent 45%),radial-gradient(ellipse at 4% 4%,rgba(249,115,22,.04) 0%,transparent 38%),var(--bg);}
.s-cover .pad{justify-content:flex-end;}
.s-cover .eyebrow{margin-bottom:auto;}
.s-cover .rule{margin-bottom:20px;}
.s-cover h1{font-size:4.2rem;font-weight:800;letter-spacing:-.045em;line-height:1.02;}

/* SECTION */
.s-section{background:#111111;}
.s-section .pad{justify-content:center;}
.s-section .sec-eye{font-size:.65rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.35);margin-bottom:18px;}
.s-section .sec-rule{width:44px;height:3px;background:var(--grad);border-radius:2px;margin-bottom:24px;}
.s-section .sec-title{font-size:3.6rem;font-weight:800;letter-spacing:-.045em;line-height:1.06;color:#fff;}
.s-section .sec-sub{margin-top:22px;font-size:1rem;color:rgba(255,255,255,.48);max-width:68%;line-height:1.65;font-weight:400;}
.slide.s-section::after{color:rgba(255,255,255,.12);}

/* STATEMENT */
.s-statement .pad{justify-content:center;}
.s-statement .slabel{font-size:.68rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:20px;}
.s-statement .stmt{font-size:2.7rem;font-weight:800;letter-spacing:-.04em;line-height:1.1;max-width:90%;}
.s-statement .items{margin-top:26px;display:flex;flex-direction:column;}
.s-statement .sitem{display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-top:1px solid var(--border);font-size:1rem;font-weight:500;color:var(--text);line-height:1.45;}
.s-statement .sitem:last-child{border-bottom:1px solid var(--border);}
.s-statement .sitem .sn{font-size:.6rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;flex-shrink:0;padding-top:3px;min-width:40px;}
.s-statement .snote{margin-top:16px;font-size:.88rem;color:var(--muted);line-height:1.65;}

/* KEY */
.s-key .pad{justify-content:center;}
.s-key .key-eye{font-size:.7rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:24px;}
.s-key .key-q{font-size:3rem;font-weight:800;letter-spacing:-.04em;line-height:1.12;max-width:90%;}
.s-key .key-sub{margin-top:26px;font-size:1rem;color:var(--muted);max-width:74%;line-height:1.65;font-weight:400;}

/* COMPARE */
.s-compare .pad{justify-content:center;}
.s-compare h2{font-size:1.8rem;font-weight:800;letter-spacing:-.035em;margin-bottom:20px;}
.compare-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.compare-grid.three{grid-template-columns:1fr 1fr 1fr;}
.ccol{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px 24px;}
.ccol .ctitle{font-size:.62rem;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-bottom:14px;}
.ccol ul{list-style:none;display:flex;flex-direction:column;gap:10px;}
.ccol ul li{font-size:.96rem;font-weight:500;display:flex;align-items:flex-start;gap:10px;line-height:1.38;}
.ccol ul li::before{content:'';width:5px;height:5px;border-radius:50%;flex-shrink:0;background:rgba(0,0,0,.2);margin-top:6px;}
.ccol.strong{border-color:rgba(249,115,22,.25);}
.ccol.strong ul li::before{background:var(--orange);}
.ccol ul li em{font-style:italic;color:var(--muted);font-size:.88rem;}
.cmp-note{margin-top:14px;font-size:.86rem;color:var(--muted);font-style:italic;text-align:center;}

/* PHASES */
.s-phases .pad{justify-content:center;}
.s-phases h2{font-size:1.8rem;font-weight:800;letter-spacing:-.035em;margin-bottom:26px;}
.phases-grid{display:grid;}
.phase{padding:20px 24px;}
.phase+.phase{border-left:1px solid var(--border);}
.ph-label{font-size:.63rem;font-weight:700;letter-spacing:.16em;text-transform:uppercase;margin-bottom:9px;}
.ph-name{font-size:1.5rem;font-weight:700;letter-spacing:-.03em;line-height:1.1;margin-bottom:10px;}
.ph-desc{font-size:.87rem;color:var(--muted);line-height:1.6;}

/* LIST */
.s-list .pad{justify-content:center;}
.s-list .listttl{font-size:1.8rem;font-weight:800;letter-spacing:-.035em;margin-bottom:8px;}
.s-list .ls-sub{font-size:.82rem;color:var(--muted);font-weight:400;margin-bottom:18px;line-height:1.5;}
.s-list ol.clean{list-style:none;display:flex;flex-direction:column;}
.s-list ol.clean li{display:flex;align-items:flex-start;gap:16px;padding:10px 0;border-top:1px solid var(--border);font-size:.92rem;font-weight:500;color:var(--text);line-height:1.4;}
.s-list ol.clean li:last-child{border-bottom:1px solid var(--border);}
.s-list ol.clean .n{font-size:.68rem;font-weight:800;letter-spacing:.1em;flex-shrink:0;padding-top:3px;min-width:22px;}
.s-list .li-main{line-height:1.3;}
.s-list .dtl{display:block;font-size:.74rem;color:var(--muted);font-weight:400;line-height:1.4;margin-top:2px;}

/* INSIGHT */
.s-insight{background:radial-gradient(ellipse at 100% 100%,rgba(124,58,237,.06) 0%,transparent 48%),var(--bg);}
.s-insight .pad{justify-content:center;}
.insight-text{font-size:3.4rem;font-weight:800;letter-spacing:-.045em;line-height:1.08;max-width:88%;}
.next-label{margin-top:40px;font-size:.7rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);display:flex;align-items:center;gap:10px;}
.next-label::before{content:'→';color:var(--orange);font-size:.85rem;letter-spacing:0;}

/* IG PROFILE */
.s-igprofile .pad{padding:3.5% 5%;gap:10px;}
.ig-slide-title{font-size:1.42rem;font-weight:800;letter-spacing:-.03em;flex-shrink:0;}
.ig-slide-sub{font-size:.78rem;color:var(--muted);margin-top:3px;}
.ig-slide-grid{display:grid;grid-template-columns:260px 1fr;gap:24px;flex:1;align-items:start;min-height:0;}
.ig-mock-svg{display:block;width:260px;height:auto;border-radius:12px;box-shadow:0 2px 16px rgba(0,0,0,.16),0 0 0 1px rgba(0,0,0,.06);}
.ig-analysis-panel{display:flex;flex-direction:column;gap:8px;}
.ig-analysis-title{font-size:.6rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:2px;}
.ig-ai{display:flex;align-items:flex-start;gap:9px;padding:9px 12px;border-radius:10px;border:1px solid var(--border);background:var(--surface);}
.ig-ai.good{border-color:rgba(34,197,94,.22);background:rgba(34,197,94,.04);}
.ig-ai.bad{border-color:rgba(220,38,38,.22);background:rgba(220,38,38,.04);}
.ig-ai.warn{border-color:rgba(217,119,6,.22);background:rgba(217,119,6,.04);}
.ig-badge{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.6rem;font-weight:800;flex-shrink:0;margin-top:1px;}
.ig-badge.good{background:rgba(34,197,94,.18);color:#15803d;}
.ig-badge.bad{background:rgba(220,38,38,.18);color:#b91c1c;}
.ig-badge.warn{background:rgba(217,119,6,.18);color:#92400e;}
.ig-ai-text{font-size:.8rem;font-weight:600;color:var(--text);line-height:1.35;}
.ig-ai-desc{font-size:.71rem;color:var(--muted);display:block;font-weight:400;margin-top:2px;line-height:1.42;}

/* IG PHOTO — screenshot real cropado */
.ig-photo-wrap{overflow:hidden;position:relative;aspect-ratio:1286/797;border-radius:10px;box-shadow:0 2px 16px rgba(0,0,0,.16),0 0 0 1px rgba(0,0,0,.06);background:#f0f0f0;}
.ig-photo-wrap img{position:absolute;width:calc(100% * 3840/1286);height:auto;left:calc(-100% * 169/1286);top:calc(-100% * 145/797);pointer-events:none;display:block;}
.ig-ann-overlay{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;}
.ig-slide-grid2{display:grid;grid-template-columns:1.45fr 1fr;gap:22px;flex:1;align-items:start;min-height:0;}

/* BIO BUILDER */
.s-biobuilder .pad{justify-content:center;}
.bb-title{font-size:1.6rem;font-weight:800;letter-spacing:-.035em;margin-bottom:14px;}
.bb-grid{display:grid;grid-template-columns:1.15fr 1fr;gap:22px;align-items:start;}
.bb-lines{display:flex;flex-direction:column;gap:6px;}
.bb-line{display:grid;grid-template-columns:26px 1fr;gap:10px;align-items:center;padding:9px 12px;border-radius:9px;border:1px solid var(--border);}
.bb-line.active{border-color:rgba(249,115,22,.3);background:rgba(249,115,22,.04);}
.bb-line.done{border-color:rgba(34,197,94,.2);background:rgba(34,197,94,.03);}
.bb-n{font-size:.66rem;font-weight:800;color:var(--subtle);text-align:center;}
.bb-line.active .bb-n,.bb-line.done .bb-n{background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
.bb-label{font-size:.62rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);}
.bb-value{font-size:.84rem;font-weight:500;color:var(--subtle);}
.bb-line.done .bb-value{color:rgba(17,17,17,.45);font-style:italic;}
.bb-line.active .bb-value{color:var(--orange);font-weight:700;}
.bb-right{display:flex;flex-direction:column;gap:11px;}
.bb-card{background:#fff;border:1px solid #dbdbdb;border-radius:10px;padding:14px 16px;}
.bb-card-handle{font-size:.7rem;font-weight:700;color:#262626;margin-bottom:9px;padding-bottom:8px;border-bottom:1px solid #efefef;}
.bb-card-bio{font-size:.78rem;color:#262626;line-height:1.72;font-family:-apple-system,BlinkMacSystemFont,'Inter',sans-serif;}
.bb-note{font-size:.82rem;color:var(--muted);line-height:1.58;padding:10px 13px;border-radius:8px;border:1px solid var(--border);background:var(--surface);}

/* MODELO BIO */
.s-modelo-bio .pad{justify-content:center;}
.mb-title{font-size:1.62rem;font-weight:800;letter-spacing:-.035em;margin-bottom:6px;}
.mb-sub{font-size:.8rem;color:var(--muted);margin-bottom:16px;}
.mb-grid{display:grid;grid-template-columns:1fr 1.3fr;gap:22px;align-items:start;}
.mb-card{background:#fff;border:1px solid #dbdbdb;border-radius:12px;padding:18px;}
.mb-top{display:flex;align-items:center;gap:10px;margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid #efefef;}
.mb-avatar{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:#fff;flex-shrink:0;font-family:'Inter',sans-serif;}
.mb-handle{font-size:.72rem;font-weight:700;color:#262626;}
.mb-display{font-size:.66rem;color:#737373;margin-top:1px;}
.mb-bio{font-size:.78rem;color:#262626;line-height:1.72;font-family:-apple-system,BlinkMacSystemFont,'Inter',sans-serif;}
.mb-link{font-size:.72rem;color:#0095f6;margin-top:6px;}
.mb-analysis{display:flex;flex-direction:column;gap:8px;}
.mb-ai{display:flex;gap:10px;align-items:flex-start;padding:9px 12px;border-radius:9px;border:1px solid var(--border);background:var(--surface);}
.mb-ln{font-size:.65rem;font-weight:800;flex-shrink:0;padding-top:2px;min-width:16px;background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
.mb-ai-text{font-size:.82rem;font-weight:600;color:var(--text);line-height:1.3;}
.mb-ai-desc{font-size:.72rem;color:var(--muted);display:block;margin-top:2px;font-weight:400;line-height:1.42;}

/* MAPA */
.s-mapa .pad{justify-content:center;}
.mapa-title{font-size:1.62rem;font-weight:800;letter-spacing:-.035em;margin-bottom:16px;}
.mapa-sub{font-size:.84rem;color:var(--muted);margin-bottom:18px;line-height:1.55;}
.mapa-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.mapa-row{display:grid;grid-template-columns:1fr 30px 1fr;align-items:center;padding:12px 14px;border-radius:10px;border:1px solid var(--border);background:var(--surface);}
.mapa-from strong{font-weight:700;color:var(--text);display:block;font-size:.84rem;}
.mapa-from span{color:var(--muted);font-size:.72rem;}
.mapa-arr{text-align:center;color:var(--orange);font-size:1.1rem;font-weight:800;}
.mapa-to{font-size:.8rem;font-weight:600;color:var(--text);}
.mapa-to small{display:block;font-size:.7rem;color:var(--muted);font-weight:400;margin-top:2px;}

/* NAV */
#ui{position:fixed;bottom:10px;left:50%;transform:translateX(-50%);z-index:50;display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.72);border:1px solid rgba(0,0,0,.1);backdrop-filter:blur(16px);padding:4px 10px;border-radius:100px;box-shadow:0 2px 10px rgba(0,0,0,.1);}
#ui button{background:none;border:none;font-size:.85rem;cursor:pointer;opacity:.5;padding:2px 5px;border-radius:6px;color:#111;line-height:1;}
#ui button:hover{opacity:1;background:rgba(0,0,0,.07);}
#counter{font-size:.62rem;color:rgba(0,0,0,.45);font-variant-numeric:tabular-nums;min-width:32px;text-align:center;font-weight:600;}
#hint{position:fixed;top:14px;right:16px;z-index:50;font-size:.68rem;color:rgba(0,0,0,.3);letter-spacing:.04em;}
</style>
</head>
<body>
<div id="hint">← → navegar · F tela cheia</div>
<div id="stage"></div>
<div id="ui"><button id="prev">‹</button><span id="counter">1/1</span><button id="next">›</button></div>
<script>
/* ── Annotation helpers (SVG, viewBox 0 0 260 462) ── */
const D={
  circle:(cx,cy,rx,ry,col='#e11d48',w=2.5)=>{const ox=rx*.18,oy=ry*.18;return `<path d="M ${cx-rx},${cy} Q ${cx-rx},${cy-ry-oy} ${cx},${cy-ry} Q ${cx+rx+ox},${cy-ry} ${cx+rx},${cy} Q ${cx+rx},${cy+ry+oy} ${cx},${cy+ry} Q ${cx-rx-ox},${cy+ry} ${cx-rx},${cy}Z" fill="none" stroke="${col}" stroke-width="${w}" stroke-linecap="round" stroke-linejoin="round" opacity=".88"/>`},
  arrow:(x1,y1,x2,y2,col='#e11d48',w=2.2)=>{const dx=x2-x1,dy=y2-y1,len=Math.sqrt(dx*dx+dy*dy)||1,nx=dx/len,ny=dy/len,px=-ny,py=nx,mx=(x1+dx*.45+px*14).toFixed(1),my=(y1+dy*.45+py*14).toFixed(1),h1x=(x2-nx*8-ny*6).toFixed(1),h1y=(y2-ny*8+nx*6).toFixed(1),h2x=(x2-nx*8+ny*6).toFixed(1),h2y=(y2-ny*8-nx*6).toFixed(1);return `<path d="M ${x1},${y1} Q ${mx},${my} ${x2},${y2}" fill="none" stroke="${col}" stroke-width="${w}" stroke-linecap="round"/><path d="M ${h1x},${h1y} L ${x2},${y2} L ${h2x},${h2y}" fill="none" stroke="${col}" stroke-width="${w}" stroke-linecap="round" stroke-linejoin="round"/>`},
  check:(x,y,col='#16a34a',w=3)=>`<path d="M ${x-10},${y} L ${x-2},${y+9} L ${x+12},${y-9}" fill="none" stroke="${col}" stroke-width="${w}" stroke-linecap="round" stroke-linejoin="round"/>`,
  cross:(x,y,col='#dc2626',w=3)=>`<path d="M ${x-8},${y-8} L ${x+8},${y+8} M ${x+8},${y-8} L ${x-8},${y+8}" fill="none" stroke="${col}" stroke-width="${w}" stroke-linecap="round"/>`,
  underline:(x1,y,x2,col='#16a34a',w=2.3)=>`<path d="M ${x1},${y} Q ${(x1+x2)/2},${y+3} ${x2},${y}" fill="none" stroke="${col}" stroke-width="${w}" stroke-linecap="round"/>`,
  badge:(x,y,n,t='bad')=>{const c={good:'#16a34a',bad:'#dc2626',warn:'#d97706'},bg={good:'rgba(34,197,94,.2)',bad:'rgba(220,38,38,.2)',warn:'rgba(217,119,6,.2)'};return `<circle cx="${x}" cy="${y}" r="10" fill="${bg[t]||bg.bad}" stroke="${c[t]||c.bad}" stroke-width="1.5"/><text x="${x}" y="${y+4}" text-anchor="middle" fill="${c[t]||c.bad}" font-size="9" font-weight="800" font-family="Inter,sans-serif">${n}</text>`},
  tag:(x,y,txt,t='bad')=>{const c={good:'#16a34a',bad:'#dc2626',warn:'#d97706'},bg={good:'rgba(34,197,94,.1)',bad:'rgba(220,38,38,.1)',warn:'rgba(217,119,6,.1)'};const w2=txt.length*5.2+14;return `<rect x="${x}" y="${y-9}" width="${w2}" height="16" rx="4" fill="${bg[t]||bg.bad}" stroke="${c[t]||c.bad}" stroke-width="1"/><text x="${x+6}" y="${y+2}" fill="${c[t]||c.bad}" font-size="8" font-weight="700" font-family="Inter,sans-serif">${txt}</text>`}
};

/* ── igMock: pure-SVG Instagram profile (viewBox 0 0 260 462) ── */
function igMock(title,sub,p,anns,items){
  const bl=p.bio.split('\n');
  const bioSVG=bl.map((line,i)=>{const isLnk=line.includes('👇')||i===bl.length-1&&line.includes('link');return `<text x="12" y="${126+i*15}" font-size="9.5" fill="${isLnk?'#0095f6':'#262626'}" font-family="Inter,-apple-system,sans-serif">${line}</text>`}).join('');
  const hl=(p.highlights||[]).slice(0,5).map((h,i)=>{const hx=22+i*48;return `<circle cx="${hx}" cy="252" r="22" fill="none" stroke="#dbdbdb" stroke-width="1"/><text x="${hx}" y="252" text-anchor="middle" dominant-baseline="middle" font-size="15">${h.icon}</text><text x="${hx}" y="279" text-anchor="middle" font-size="7" fill="#262626" font-family="Inter,-apple-system,sans-serif">${h.name}</text>`}).join('');
  const gc=p.gridColors||['#d4c5b5','#c8bfb0','#c0b8a8','#d0c8b8','#c5bab0','#ccc5b8'];
  const gridSVG=gc.slice(0,6).map((c,i)=>{const col=i%3,row=Math.floor(i/3),x=col*87+(col>0?2:0),y=286+row*88+(row>0?2:0);return `<rect x="${x}" y="${y}" width="${col===2?87:85}" height="86" fill="${c}"/>`}).join('');
  const id=p.handle.replace(/[^a-z0-9]/g,'');
  const svg=`<svg class="ig-mock-svg" viewBox="0 0 260 462" xmlns="http://www.w3.org/2000/svg">
<defs><linearGradient id="igr${id}" x1="0%" y1="100%" x2="100%" y2="0%"><stop offset="0%" stop-color="#f09433"/><stop offset="50%" stop-color="#dc2743"/><stop offset="100%" stop-color="#bc1888"/></linearGradient></defs>
<rect width="260" height="462" fill="#fff"/>
<text x="12" y="20" font-size="10" font-weight="700" fill="#262626" font-family="Inter,-apple-system,sans-serif">@${p.handle}</text>
<text x="235" y="20" font-size="13" fill="#262626" font-family="Inter,sans-serif">☰</text>
<line x1="0" y1="30" x2="260" y2="30" stroke="#efefef" stroke-width="1"/>
<circle cx="42" cy="73" r="30" fill="none" stroke="url(#igr${id})" stroke-width="2" opacity=".7"/>
<circle cx="42" cy="73" r="26" fill="${p.avatarColor||'#f97316'}"/>

/* ── igPhoto: screenshot real com anotações SVG ──
   viewBox das anotações: 0 0 1286 797
   Origem = pixel (169,125) do original 3840×1200
   Âncoras típicas (px na região):
     handle y≈67 | avatar cx≈380 cy≈130 r≈60
     display name y≈200 | bio L1 y≈228 L2≈251 L3≈274 L4≈297 L5≈320
     botões y≈390 | destaques centers y≈490 | grid y≈600+
*/
function igPhoto(title,sub,imgSrc,anns,items){
  const aiHTML=items.map((it,i)=>`<div class="ig-ai ${it.type}"><div class="ig-badge ${it.type}">${i+1}</div><div><div class="ig-ai-text">${it.title}</div>${it.desc?`<span class="ig-ai-desc">${it.desc}</span>`:''}</div></div>`).join('');
  return `<div class="pad"><div class="ig-slide-title">${title}</div>${sub?`<div class="ig-slide-sub">${sub}</div>`:''}<div class="ig-slide-grid2"><div class="ig-photo-wrap"><img src="${imgSrc}" alt=""><svg class="ig-ann-overlay" viewBox="0 0 1286 797" preserveAspectRatio="none">${anns||''}</svg></div><div class="ig-analysis-panel"><div class="ig-analysis-title">Análise</div>${aiHTML}</div></div></div>`;
}

/* ── bioBuilder ── */
function bioBuilder(title,lines,activeIdx,handle,dispName,note){
  const linesHTML=lines.map((l,i)=>{
    const s=i<activeIdx?'done':i===activeIdx?'active':'';
    const vStyle=i<activeIdx?'':'';
    const vTxt=i<activeIdx?l.value:i===activeIdx?l.value:'';
    return `<div class="bb-line ${s}"><div class="bb-n">${String(i+1).padStart(2,'0')}</div><div><div class="bb-label">${l.label}</div><div class="bb-value">${vTxt}</div></div></div>`;
  }).join('');
  const cardBio=lines.slice(0,activeIdx+1).map((l,i)=>{const isLnk=l.label==='CTA'||l.value.includes('👇');const isA=i===activeIdx;return `<span style="display:block;font-family:-apple-system,'Inter',sans-serif;font-size:.77rem;line-height:1.72;color:${isLnk?'#0095f6':isA?'#f97316':'rgba(38,38,38,.55)'};font-weight:${isA?'700':'400'}">${l.value}</span>`}).join('');
  return `<div class="pad"><div class="bb-title">${title}</div><div class="bb-grid"><div class="bb-lines">${linesHTML}</div><div class="bb-right"><div class="bb-card"><div class="bb-card-handle">@${handle} · <span style="font-weight:400;color:#737373;font-size:.66rem">${dispName}</span></div><div class="bb-card-bio">${cardBio}</div></div>${note?`<div class="bb-note">${note}</div>`:''}</div></div></div>`;
}

/* ── modeloBio ── */
function modeloBio(title,sub,handle,dispName,grad,bioLines,analysis){
  const bioHTML=bioLines.map(l=>{const isLnk=l.includes('👇');return `<div style="font-family:-apple-system,'Inter',sans-serif;font-size:.77rem;line-height:1.72;color:${isLnk?'#0095f6':'#262626'}">${l}</div>`}).join('');
  const initials=(dispName.split(' ').map(w=>w[0]).slice(0,2).join(''));
  const anaHTML=analysis.map((a,i)=>`<div class="mb-ai"><div class="mb-ln">L${i+1}</div><div><div class="mb-ai-text">${a.text}</div>${a.desc?`<span class="mb-ai-desc">${a.desc}</span>`:''}</div></div>`).join('');
  return `<div class="pad"><div class="mb-title">${title}</div>${sub?`<div class="mb-sub">${sub}</div>`:''}<div class="mb-grid"><div class="mb-card"><div class="mb-top"><div class="mb-avatar" style="background:${grad||'var(--orange)'}">${initials}</div><div><div class="mb-handle">@${handle}</div><div class="mb-display">${dispName}</div></div></div><div class="mb-bio">${bioHTML}</div><div class="mb-link">link.na.bio 👇</div></div><div class="mb-analysis">${anaHTML}</div></div></div>`;
}

/* ── mapa ── */
function mapa(title,sub,rows){
  return `<div class="pad"><div class="mapa-title">${title}</div>${sub?`<div class="mapa-sub">${sub}</div>`:''}<div class="mapa-grid">${rows.map(r=>`<div class="mapa-row"><div class="mapa-from"><strong>${r.from}</strong><span>${r.fromSub||''}</span></div><div class="mapa-arr">→</div><div class="mapa-to">${r.to}<small>${r.toSub||''}</small></div></div>`).join('')}</div></div>`;
}

/* ── sec / lst / ph ── */
function sec(eye,title,sub){return `<div class="pad"><div class="sec-eye">${eye}</div><div class="sec-rule"></div><div class="sec-title">${title}</div>${sub?`<div class="sec-sub">${sub}</div>`:''}</div>`}
function lst(title,sub,items,vis){const shown=items.slice(0,vis);return `<div class="pad"><div class="listttl">${title}</div>${sub?`<div class="ls-sub">${sub}</div>`:''}<ol class="clean">${shown.map((it,i)=>{const text=typeof it==='string'?it:it.title;const dtl=typeof it==='object'&&it.dtl?`<span class="dtl">${it.dtl}</span>`:'';return `<li><span class="n gradtext">${String(i+1).padStart(2,'0')}</span><span class="li-main">${text}${dtl}</span></li>`}).join('')}</ol></div>`}
function ph(title,data,vis){const shown=data.slice(0,vis);return `<div class="pad"><h2>${title}</h2><div class="phases-grid" style="grid-template-columns:repeat(${shown.length},1fr)">${shown.map(p=>`<div class="phase"><div class="ph-label gradtext">${p.label}</div><div class="ph-name">${p.name}</div><div class="ph-desc">${p.desc}</div></div>`).join('')}</div></div>`}

/* 19 */ {cls:'s-compare',html:`<div class="pad">

<li><strong>Nome da imobiliária</strong> — se você sair, o posicionamento vai junto. O nome de exibição precisa ser seu</li>
<li><strong>Emojis no lugar de palavras</strong> — emojis não são indexados pelo algoritmo. São invisíveis para o buscador</li>

<li>Nicho ou produto em texto, não emoji — "MCMV" não em 🏠</li>
<li>Dentro de 30 caracteres — contar sempre antes de publicar</li>
</ul>

/* 39 */ {cls:'s-key',html:`<div class="pad">
<div class="key-eye">O que destaques fazem que posts não fazem</div>
<div class="key-q">Os destaques ficam <span class="gradtext">fixos no topo do perfil</span> — presentes para qualquer pessoa que chega, independente de quando chegou.</div>
<div class="key-sub">Enquanto posts competem no algoritmo e stories expiram em 24 horas, os destaques não têm data de validade. São o primeiro portfólio que qualquer visitante encontra antes de rolar o grid, antes de ler qualquer legenda.<br><br>O Instagram exibe os destaques da esquerda para a direita, com o mais recentemente atualizado à esquerda. O destaque que você atualiza com mais frequência fica sempre na posição mais vista. Essa lógica é a chave para decidir qual destaque atualizar com mais regularidade.</div>
</div>`},

/* 42 */ {cls:'s-key',html:`<div class="pad">
<div class="key-eye">A ordem que o Instagram impõe — e como usar a seu favor</div>
<div class="key-q">O Instagram exibe o destaque <span class="gradtext">mais recentemente atualizado à esquerda</span> — na posição mais vista.</div>
<div class="key-sub">O destaque "Imóveis disponíveis" deveria ser atualizado semanalmente — e sobe automaticamente para a posição mais vista. Já "Quem sou" não precisa ser atualizado com frequência, mas precisa estar sempre correto.<br><br>Estratégia: atualize "Imóveis" com cada novo portfólio. Mantenha "Clientes" com depoimentos recentes. O algoritmo trabalha a favor de quem atualiza conteúdo permanente com frequência.</div>
</div>`},

/* 44 */ {cls:'s-statement',html:`<div class="pad">
<div class="slabel">O grid como identidade antes da leitura</div>
<div class="stmt">O visitante vê o grid<br>como bloco — e decide<br><span class="gradtext">em dois segundos</span><br>se o perfil tem identidade.</div>
<div class="items">
<div class="sitem"><span class="sn">O que ele vê</span>Cores predominantes, tipo de conteúdo, consistência visual — tudo isso antes de clicar em qualquer post.</div>
<div class="sitem"><span class="sn">O que processa</span>Existe um padrão? Esse perfil sabe o que é? Vou encontrar conteúdo relevante aqui?</div>
<div class="sitem"><span class="sn">A regra</span>Nove posts formam a primeira impressão visual completa. A consistência desses nove diz mais do que qualquer legenda individual.</div>
</div>
</div>`},

/* 45 */ {cls:'s-compare',html:`<div class="pad">
<h2>Zona 5 — Grid: o que destrói vs. o que comunica posicionamento</h2>
<div class="compare-grid">
<div class="ccol">
<div class="ctitle">O que destrói a identidade visual</div>
<ul>
<li>Mix de fotos pessoais e profissionais sem separação</li>
<li>Múltiplas paletas de cores — cada post parece de um perfil diferente</li>
<li>Alternância aleatória de formatos sem ritmo — sem fio condutor</li>
<li>Qualidade de imagem muito variada — foto escura ao lado de estúdio profissional</li>
<li>Artes de parceiras e imobiliárias com templates conflitantes</li>
</ul>
</div>
<div class="ccol strong">
<div class="ctitle">O que comunica posicionamento</div>
<ul>
<li>Paleta de 2-3 cores que se repete — qualquer post é reconhecível como seu</li>
<li>Presença do rosto com frequência — humaniza o perfil profissional</li>
<li>Tipo de conteúdo consistente com ritmo definido</li>
<li>Qualidade visual uniforme — não precisa ser fotógrafo, precisa ser intencional</li>
<li>Não precisa ser "bonito" no sentido estético — precisa ser <em>reconhecível</em></li>
</ul>
</div>
</div>
</div>`},

/* 46 */ {cls:'s-key',html:`<div class="pad">
<div class="key-eye">A regra do grid</div>
<div class="key-q">Você não precisa de um grid <span class="gradtext">perfeito.</span><br>Precisa de um grid <span class="gradtext">reconhecível.</span></div>
<div class="key-sub">Um visitante que chegou hoje e voltar em três semanas precisa saber que está no mesmo perfil sem olhar para o nome. Se a identidade visual mudou ou não tem padrão, o perfil não cria reconhecimento.<br><br>A regra prática: escolha 2-3 cores que representam seu posicionamento e mantenha-as nos elementos visuais de todos os posts. Isso já é suficiente para criar consistência.</div>
</div>`},

/* ── Render ── */
const stage=document.getElementById('stage');
let cur=0;
function render(){
  stage.innerHTML='';
  slides.forEach((s,i)=>{
    const el=document.createElement('div');
    el.className='slide '+s.cls+(i===cur?' active':'');
    el.innerHTML=s.html;
    stage.appendChild(el);
  });
  document.getElementById('counter').textContent=`${cur+1} / ${slides.length}`;
}
function go(d){cur=Math.max(0,Math.min(slides.length-1,cur+d));render();}
document.getElementById('prev').onclick=()=>go(-1);
document.getElementById('next').onclick=()=>go(1);
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key===' ')go(1);
  else if(e.key==='ArrowLeft')go(-1);
  else if(e.key==='f'||e.key==='F'){document.fullscreenElement?document.exitFullscreen():document.documentElement.requestFullscreen();}
});
render();
</script>
