<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Aula 3 — Seu negócio | Imob In Digital</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
<style>
:root{--bg:#fafaf8;--text:#111;--muted:rgba(17,17,17,.44);--subtle:rgba(17,17,17,.26);--border:rgba(0,0,0,.08);--surface:rgba(0,0,0,.04);--grad:linear-gradient(120deg,#f97316,#e11d48 45%,#7c3aed);--orange:#f97316}
*,::before,::after{box-sizing:border-box;margin:0;padding:0}
body{background:#1a1a1a;display:flex;flex-direction:column;min-height:100vh;align-items:center;justify-content:center;font-family:'Inter',system-ui,sans-serif;overflow:hidden}
#stage{width:min(94vw,1280px,calc((100vh - 64px)*16/9));aspect-ratio:16/9;background:var(--bg);position:relative;overflow:hidden;border-radius:4px;box-shadow:0 24px 64px rgba(0,0,0,.5)}
#stage::after{content:'IMOB IN DIGITAL';position:absolute;bottom:18px;right:22px;font-size:.52rem;font-weight:700;letter-spacing:.14em;color:var(--subtle);pointer-events:none;z-index:10}
.slide{position:absolute;inset:0;display:flex;flex-direction:column;background:var(--bg);opacity:0;transition:opacity .22s;pointer-events:none}
.slide.active{opacity:1;pointer-events:auto}
.pad{flex:1;display:flex;flex-direction:column;padding:5% 6%}
.grad{background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

.s-cover .pad{justify-content:center}
.s-cover .cov-mod{font-size:.6rem;font-weight:700;letter-spacing:.16em;color:var(--muted);text-transform:uppercase;margin-bottom:12px}
.s-cover .cov-rule{width:36px;height:2px;background:var(--grad);border-radius:2px;margin-bottom:20px}
.s-cover h1{font-size:4rem;font-weight:800;line-height:1.02;color:var(--text);margin-bottom:14px}
.s-cover .cov-sub{font-size:.95rem;color:var(--muted);max-width:58%;line-height:1.5}

.s-data .pad{justify-content:center}
.s-data .dat-eye{font-size:.6rem;font-weight:700;letter-spacing:.16em;color:var(--muted);text-transform:uppercase;margin-bottom:10px}
.s-data .dat-num{font-size:9rem;font-weight:800;line-height:.88;margin-bottom:10px}
.s-data .dat-lbl{font-size:1.4rem;font-weight:700;color:var(--text);line-height:1.25;margin-bottom:6px;max-width:72%}
.s-data .dat-src{font-size:.62rem;color:var(--subtle);font-weight:500;letter-spacing:.04em;margin-top:14px}
.s-data .dat-list{list-style:none;margin-top:14px;display:flex;flex-direction:column;gap:5px}
.s-data .dat-list li{font-size:.82rem;color:var(--muted);padding-left:12px;position:relative;line-height:1.35}
.s-data .dat-list li::before{content:'—';position:absolute;left:0;color:var(--subtle)}

.s-key .pad{justify-content:center}
.s-key .key-eye{font-size:.6rem;font-weight:700;letter-spacing:.16em;color:var(--muted);text-transform:uppercase;margin-bottom:16px}
.s-key .key-text{font-size:3rem;font-weight:800;line-height:1.1;color:var(--text);margin-bottom:20px;max-width:88%}
.s-key .key-sub{font-size:.9rem;color:var(--muted);max-width:68%;line-height:1.55}

.s-list .pad{justify-content:center}
.s-list h2{font-size:1.55rem;font-weight:800;color:var(--text);margin-bottom:5px}
.s-list .ls-sub{font-size:.8rem;color:var(--muted);margin-bottom:20px;line-height:1.4}
.s-list .ls-items{display:flex;flex-direction:column;gap:9px}
.s-list .ls-row{display:flex;align-items:flex-start;gap:10px}
.s-list .ls-n{font-size:.7rem;font-weight:800;letter-spacing:.04em;color:var(--orange);padding-top:2px;min-width:18px;flex-shrink:0}
.s-list .ls-text{font-size:.92rem;font-weight:600;color:var(--text);line-height:1.4}
.s-list .ls-dtl{font-size:.77rem;color:var(--muted);line-height:1.35;margin-top:2px}

.s-statement .pad{justify-content:center}
.s-statement .st-eye{font-size:.6rem;font-weight:700;letter-spacing:.16em;color:var(--muted);text-transform:uppercase;margin-bottom:10px}
.s-statement h2{font-size:2rem;font-weight:800;color:var(--text);line-height:1.18;margin-bottom:18px;max-width:88%}
.s-statement .st-body{font-size:.95rem;color:var(--muted);line-height:1.6;max-width:72%;margin-bottom:20px}
.s-statement .st-items{display:flex;flex-direction:column;gap:8px}
.s-statement .st-item{display:flex;align-items:flex-start;gap:9px;font-size:.88rem;color:var(--text);font-weight:500;line-height:1.4}
.s-statement .st-dot{width:6px;height:6px;border-radius:50%;background:var(--orange);margin-top:5px;flex-shrink:0}

.s-compare .pad{justify-content:flex-start;padding-top:5%}
.s-compare .cmp-hd{font-size:1.2rem;font-weight:800;color:var(--text);margin-bottom:18px}
.s-compare .cmp-cols{display:grid;grid-template-columns:1fr 1fr;gap:14px;flex:1}
.s-compare .cmp-col{background:var(--surface);border-radius:10px;padding:18px 20px;border:1px solid var(--border);display:flex;flex-direction:column}
.s-compare .cmp-lbl{font-size:.58rem;font-weight:800;letter-spacing:.16em;color:var(--muted);text-transform:uppercase;margin-bottom:8px}
.s-compare .cmp-ttl{font-size:1rem;font-weight:800;color:var(--text);margin-bottom:10px;line-height:1.15}
.s-compare .cmp-items{display:flex;flex-direction:column;gap:5px}
.s-compare .cmp-it{font-size:.78rem;color:var(--muted);padding-left:11px;position:relative;line-height:1.35}
.s-compare .cmp-it::before{content:'';width:4px;height:4px;border-radius:50%;background:rgba(17,17,17,.15);position:absolute;left:0;top:6px}
.s-compare .cmp-note{font-size:.76rem;color:var(--muted);margin-top:14px;font-style:italic}

.s-phases .pad{justify-content:flex-start;padding-top:5%}
.s-phases .ph-ttl{font-size:1.1rem;font-weight:800;color:var(--text);margin-bottom:18px;max-width:82%;line-height:1.25}
.s-phases .ph-cols{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;flex:1}
.s-phases .ph-col{background:var(--surface);border-radius:10px;padding:16px 14px;border:1px solid var(--border)}
.s-phases .ph-n{font-size:.58rem;font-weight:800;letter-spacing:.12em;color:var(--orange);text-transform:uppercase;margin-bottom:7px}
.s-phases .ph-nm{font-size:.95rem;font-weight:800;color:var(--text);margin-bottom:8px}
.s-phases .ph-items{display:flex;flex-direction:column;gap:4px}
.s-phases .ph-it{font-size:.7rem;color:var(--muted);line-height:1.35}

.s-formula .pad{justify-content:center}
.s-formula .frm-lbl{font-size:.6rem;font-weight:700;letter-spacing:.16em;color:var(--muted);text-transform:uppercase;margin-bottom:20px}
.s-formula .frm-txt{font-size:2.8rem;font-weight:800;line-height:1.3;color:var(--text)}
.s-formula .frm-br{color:var(--orange)}

.s-examples .pad{justify-content:center}
.s-examples h2{font-size:1.2rem;font-weight:800;color:var(--text);margin-bottom:18px}
.s-examples .ex-list{display:flex;flex-direction:column;gap:12px}
.s-examples .ex-item{background:var(--surface);border-left:3px solid var(--orange);border-radius:0 8px 8px 0;padding:12px 16px}
.s-examples .ex-text{font-size:.82rem;font-weight:600;color:var(--text);line-height:1.55;font-style:italic}

.s-gpt .pad{justify-content:center;align-items:center;text-align:center}
.s-gpt .gpt-lbl{font-size:.6rem;font-weight:700;letter-spacing:.16em;color:var(--muted);text-transform:uppercase;margin-bottom:14px}
.s-gpt .gpt-ttl{font-size:3.5rem;font-weight:800;line-height:1;margin-bottom:20px}
.s-gpt .gpt-pills{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:18px}
.s-gpt .gpt-pill{font-size:.68rem;font-weight:700;letter-spacing:.04em;border:1px solid var(--border);border-radius:20px;padding:5px 14px;color:var(--muted);background:var(--surface)}
.s-gpt .gpt-note{font-size:.78rem;color:var(--subtle);max-width:60%;line-height:1.5}

.s-insight .pad{justify-content:center}
.s-insight h2{font-size:3rem;font-weight:800;line-height:1.1;margin-bottom:18px;max-width:85%}
.s-insight .ins-note{font-size:.88rem;color:var(--muted);font-weight:500}

#ui{display:flex;align-items:center;gap:6px;padding:8px 0 4px}
#ui button{background:none;border:none;cursor:pointer;font-size:.85rem;color:#ccc;padding:4px 10px;border-radius:4px;transition:color .15s}
#ui button:hover{color:#fff}
#ui button:disabled{opacity:.28;cursor:default}
#counter{font-size:.6rem;color:#888;letter-spacing:.06em;min-width:44px;text-align:center}
</style>
</head>
<body>
<div id="stage"></div>
<div id="ui">
  <button id="prev">&#8592;</button>
  <span id="counter"></span>
  <button id="next">&#8594;</button>
  <button id="fs" title="Tela cheia">⛶</button>
</div>
<script>
const slides = [
  /* 01 */
  {type:'s-cover',module:'Módulo 1 · Aula 3',title:'Seu negócio',
   sub:'Antes de definir para quem você vende, você precisa ter clareza sobre o que você vende.'},

  /* 02 */
  {type:'s-statement',
   title:'O que não está articulado<br>não existe na comunicação.',
   items:['Não aparece no conteúdo','Não aparece no criativo','Não aparece na conversa com o lead']},

  /* 03 */
  {type:'s-list',title:'4 dimensões que definem o seu negócio',
   items:[{text:'Tipo de imóvel'},{text:'Faixa de valor'},{text:'Área de atuação'},{text:'Como você opera'}]},

  /* 04 */
  {type:'s-compare',title:'Dimensão 1 — Tipo de imóvel',
   left:{label:'Lançamento',title:'Urgência e escassez',
     items:['Urgência de janela — estoque limitado por fase','Preço sobe conforme a obra avança','Comprador decide com menos informação','Apelo à valorização futura']},
   right:{label:'Imóvel usado',title:'Cautela e comparação',
     items:['Quer inspecionar antes de qualquer coisa','Quer entender a história e condição do imóvel','Processo de comparação mais longo','Negociação de preço faz parte do processo']}},

  /* 05 */
  {type:'s-compare',title:'Dimensão 2 — Faixa de valor',
   left:{label:'R$200 mil',title:'Primeiro imóvel',
     items:['Financiamento Caixa — processo mais longo','Família ansiosa, estado emocional alto','Precisa de orientação em cada etapa','Decisão envolve toda a família']},
   right:{label:'R$2 milhões',title:'Segunda compra ou investimento',
     items:['Decisão analítica, processo mais rápido','Quer dados e análise real, não só emoção','Exigência técnica maior','Já conhece o processo de compra']}},

  /* 06 */
  {type:'s-key',eyebrow:'Dimensão 3 — Área de atuação',
   text:'Especificidade não limita.<br>Ela diferencia.',
   sub:'"Especialista em imóveis em São Paulo" compete com 50 mil pessoas. "Especialista no Brooklin e Campo Belo" tem um território mental que pode dominar.'},

  /* 07 */
  {type:'s-compare',title:'Dimensão 4 — Como você opera',
   left:{label:'Corretor autônomo',title:'Vende a si mesmo',
     items:['Confiança construída na marca pessoal','Ativo vinculado ao seu nome','Estratégia de conteúdo individual','Vai com você independente de onde trabalha']},
   right:{label:'Imobiliária',title:'Vende estrutura',
     items:['Equipe, portfólio e reputação institucional','Dois trabalhos: marca da empresa + corretores','Escala pela equipe, não só pelo indivíduo','Posicionamento institucional + marcas pessoais']}},

  /* 08 */
  {type:'s-statement',eyebrow:'Requisito de entrada — não é diferencial',
   title:'"Atendimento diferenciado."<br>"Transparência."<br>"Estou sempre disponível."',
   body:'O comprador já assume isso de qualquer corretor que está considerando contratar. Caso contrário, nem estaria na conversa.',
   items:[]},

  /* 09 */
  {type:'s-phases',noPhaseLabel:true,
   title:'Diferencial real é o que muda a decisão — quando ele está te comparando com outro corretor.',
   phases:[
     {name:'Específico',items:['Não é vago ou genérico','Descreve o que você faz de forma concreta']},
     {name:'Verificável',items:['O comprador pode confirmar por si mesmo','Não é só promessa — é realidade comprovável']},
     {name:'Difícil de copiar',items:['Construído em relacionamento ou acesso exclusivo','Leva tempo para desenvolver — não é só atitude']}]},

  /* 10 */
  {type:'s-list',title:'O que diferencial real parece:',
   items:[
     {text:'Relacionamento com construtoras',detail:'Condições de pagamento exclusivas, fora do mercado aberto'},
     {text:'Análise real de valorização por bairro',detail:'Histórico de preço, obras planejadas, tendência em 3 anos'},
     {text:'Carteira de proprietários exclusivos',detail:'Imóveis fora dos portais, acessíveis só pelo seu relacionamento'},
     {text:'Acompanhamento do financiamento do início ao fim',detail:'Da simulação à assinatura no cartório — sem sumir no meio'},
     {text:'Experiência com perfil específico de comprador',detail:'Investidor, estrangeiro comprando no Brasil, downsizing, primeiro imóvel'}]},

  /* 11 */
  {type:'s-key',eyebrow:'A pergunta que revela o diferencial real',
   text:'"Se você não existisse,<br>o comprador usaria o quê?"',
   sub:'A resposta está no gap entre o que as alternativas oferecem e o que só você entrega.'},

  /* 12 */
  {type:'s-statement',eyebrow:'Anti-cliente',
   title:'Saber quem você <em>não</em> quer atender é tão estratégico quanto saber para quem vender.',
   body:'Definir o anti-cliente não é arrogância. É precisão estratégica.',
   items:['Sem clareza sobre quem não quer atrair, você traz leads que não convertem',
          'Quando sabe quem não é seu público, a comunicação afina — e naturalmente repele quem não é']},

  /* 13 */
  {type:'s-list',title:'Cada etapa onde você está presente é um argumento.',
   sub:'O que nenhum portal entrega e nenhuma comparação de taxa vai superar.',
   items:[
     {text:'Análise de financiamento antes da decisão'},
     {text:'Acompanhamento de vistorias técnicas'},
     {text:'Facilitação do processo cartorial'},
     {text:'Indicação de profissionais de confiança (reforma, inspeção)'},
     {text:'Contato ativo depois da entrega das chaves'}]},

  /* 14 */
  {type:'s-compare',
   left:{label:'Corretor comum',title:'"Vende imóvel"',
     items:['Mostra o produto e o imóvel','Acompanha até a proposta','Desaparece no processo cartorial','Sem contato depois da entrega']},
   right:{label:'Seu diferencial',title:'"Cuida da compra do começo ao fim"',
     items:['Orienta antes da decisão de compra','Acompanha vistorias e toda documentação','Facilita cartório e financiamento','Presente mesmo depois das chaves']},
   note:'Essa distinção é percebida pelo comprador antes mesmo do primeiro contato.'},

  /* 15 */
  {type:'s-formula'},

  /* 16 */
  {type:'s-examples',title:'Exemplos de como fica:',
   items:[
     '"Eu ajudo famílias em Mogi das Cruzes a encontrar o apartamento certo sem perder meses com opções erradas — do primeiro contato até a entrega das chaves, sem deixar o processo sozinho."',
     '"Eu ajudo investidores a identificar apartamentos compactos em São Paulo com potencial de valorização real — com análise de rentabilidade antes de qualquer visita, não depois."',
     '"Eu ajudo compradores de primeiro imóvel a navegar o financiamento sem ansiedade — explicando cada etapa antes que ela aconteça."']},

  /* 17 */
  {type:'s-gpt',label:'Disponível ao final do Módulo 2',
   pills:['Perfil de negócio','Diferenciais reais','Público ideal','Benchmark','Bio do Instagram'],
   note:'Quem entendeu essa aula vai construir uma fundação estratégica. Quem não entendeu vai preencher um formulário.'},

  /* 18 */
  {type:'s-insight',grad:true,
   text:'O que não está articulado<br>não existe na comunicação.',
   note:'→ Próxima aula: quem é o comprador ideal para o negócio que você acabou de descrever.'}
];

const stage = document.getElementById('stage');
let cur = 0;

function render(s) {
  switch(s.type) {
    case 's-cover':
      return `<div class="pad"><div class="cov-mod">${s.module}</div><div class="cov-rule"></div><h1>${s.title}</h1>${s.sub?`<div class="cov-sub">${s.sub}</div>`:''}</div>`;
    case 's-data': {
      const ns = s.num.length > 4 ? 'style="font-size:5rem;line-height:.9"' : '';
      return `<div class="pad"><div class="dat-eye">${s.eyebrow||''}</div><div class="dat-num grad" ${ns}>${s.num}</div><div class="dat-lbl">${s.label}</div>${s.source?`<div class="dat-src">${s.source}</div>`:''} ${s.items&&s.items.length?`<ul class="dat-list">${s.items.map(i=>`<li>${i}</li>`).join('')}</ul>`:''}</div>`;
    }
    case 's-key':
      return `<div class="pad">${s.eyebrow?`<div class="key-eye">${s.eyebrow}</div>`:''}<div class="key-text">${s.text}</div>${s.sub?`<div class="key-sub">${s.sub}</div>`:''}</div>`;
    case 's-list':
      return `<div class="pad"><h2>${s.title}</h2>${s.sub?`<div class="ls-sub">${s.sub}</div>`:''}<div class="ls-items">${s.items.map((it,i)=>`<div class="ls-row"><span class="ls-n">0${i+1}</span><div><div class="ls-text">${it.text}</div>${it.detail?`<div class="ls-dtl">${it.detail}</div>`:''}</div></div>`).join('')}</div></div>`;
    case 's-statement':
      return `<div class="pad">${s.eyebrow?`<div class="st-eye">${s.eyebrow}</div>`:''}<h2>${s.title}</h2>${s.body?`<div class="st-body">${s.body}</div>`:''} ${s.items&&s.items.length?`<div class="st-items">${s.items.map(i=>`<div class="st-item"><span class="st-dot"></span><span>${i}</span></div>`).join('')}</div>`:''}</div>`;
    case 's-compare':
      return `<div class="pad">${s.title?`<div class="cmp-hd">${s.title}</div>`:''}<div class="cmp-cols"><div class="cmp-col"><div class="cmp-lbl">${s.left.label}</div><div class="cmp-ttl">${s.left.title}</div><div class="cmp-items">${s.left.items.map(i=>`<div class="cmp-it">${i}</div>`).join('')}</div></div><div class="cmp-col"><div class="cmp-lbl">${s.right.label}</div><div class="cmp-ttl">${s.right.title}</div><div class="cmp-items">${s.right.items.map(i=>`<div class="cmp-it">${i}</div>`).join('')}</div></div></div>${s.note?`<div class="cmp-note">${s.note}</div>`:''}</div>`;
    case 's-phases':
      return `<div class="pad"><div class="ph-ttl">${s.title}</div><div class="ph-cols">${s.phases.map((p,i)=>`<div class="ph-col">${!s.noPhaseLabel?`<div class="ph-n">Fase ${i+1}</div>`:''}<div class="ph-nm">${p.name}</div><div class="ph-items">${p.items.map(it=>`<div class="ph-it">· ${it}</div>`).join('')}</div></div>`).join('')}</div></div>`;
    case 's-formula':
      return `<div class="pad"><div class="frm-lbl">A fórmula</div><div class="frm-txt">Eu ajudo <span class="frm-br">[quem]</span><br>a <span class="frm-br">[resultado]</span><br>através de <span class="frm-br">[o que você faz de diferente]</span>.</div></div>`;
    case 's-examples':
      return `<div class="pad"><h2>${s.title}</h2><div class="ex-list">${s.items.map(it=>`<div class="ex-item"><div class="ex-text">${it}</div></div>`).join('')}</div></div>`;
    case 's-gpt':
      return `<div class="pad"><div class="gpt-lbl">${s.label}</div><div class="gpt-ttl grad">Imob DNA</div><div class="gpt-pills">${(s.pills||[]).map(p=>`<span class="gpt-pill">${p}</span>`).join('')}</div>${s.note?`<div class="gpt-note">${s.note}</div>`:''}</div>`;
    case 's-insight':
      return `<div class="pad"><h2 ${s.grad?'class="grad"':''}>${s.text}</h2>${s.note?`<div class="ins-note">${s.note}</div>`:''}</div>`;
    default:
      return `<div class="pad"><p>${s.type}</p></div>`;
  }
}

slides.forEach(s => {
  const div = document.createElement('div');
  div.className = 'slide ' + s.type;
  div.innerHTML = render(s);
  stage.appendChild(div);
});

const all = stage.querySelectorAll('.slide');
const prevBtn = document.getElementById('prev');
const nextBtn = document.getElementById('next');
const counter = document.getElementById('counter');

function go(n) {
  all[cur].classList.remove('active');
  cur = Math.max(0, Math.min(n, all.length - 1));
  all[cur].classList.add('active');
  prevBtn.disabled = cur === 0;
  nextBtn.disabled = cur === all.length - 1;
  counter.textContent = `${cur + 1} / ${all.length}`;
}

prevBtn.addEventListener('click', () => go(cur - 1));
nextBtn.addEventListener('click', () => go(cur + 1));
document.getElementById('fs').addEventListener('click', () => document.documentElement.requestFullscreen?.());
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') go(cur + 1);
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') go(cur - 1);
  if (e.key === 'f' || e.key === 'F') document.documentElement.requestFullscreen?.();
});

go(0);
</script>
</body>
</html>
