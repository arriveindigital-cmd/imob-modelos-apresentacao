<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Aula 2 · Como o mercado imobiliário funciona no digital</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#fafaf8; --text:#111111;
  --muted:rgba(17,17,17,.46); --subtle:rgba(17,17,17,.28);
  --border:rgba(0,0,0,.08); --surface:rgba(0,0,0,.035);
  --grad:linear-gradient(120deg,#f97316,#e11d48 45%,#7c3aed);
  --orange:#f97316;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;background:#e6e5e2;font-family:'Inter',system-ui,sans-serif;overflow:hidden;}

#stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;}

.slide{
  position:absolute;
  width:min(94vw,1280px,calc((100vh - 64px)*16/9));
  aspect-ratio:16/9;
  background:var(--bg);
  border-radius:20px;overflow:hidden;
  opacity:0;transform:scale(.97) translateY(8px);
  transition:opacity .36s ease,transform .36s ease;
  pointer-events:none;
  box-shadow:0 32px 96px rgba(0,0,0,.2),0 2px 8px rgba(0,0,0,.1);
  color:var(--text);
}
.slide.active{opacity:1;transform:scale(1) translateY(0);pointer-events:auto;}
.slide::after{
  content:'IMOB IN DIGITAL';
  position:absolute;bottom:20px;right:26px;
  font-size:.58rem;font-weight:700;letter-spacing:.2em;
  color:rgba(17,17,17,.18);pointer-events:none;
}

.pad{position:absolute;inset:0;padding:6.5% 7.5%;display:flex;flex-direction:column;}

.gradtext{background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
.eyebrow{font-size:.7rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);}
.rule{width:44px;height:3px;background:var(--grad);border-radius:2px;}

/* COVER */
.s-cover{background:radial-gradient(ellipse at 96% 96%,rgba(124,58,237,.055) 0%,transparent 45%),radial-gradient(ellipse at 4% 4%,rgba(249,115,22,.04) 0%,transparent 38%),var(--bg);}
.s-cover .pad{justify-content:flex-end;}
.s-cover .eyebrow{margin-bottom:auto;}
.s-cover .rule{margin-bottom:20px;}
.s-cover h1{font-size:4.2rem;font-weight:800;letter-spacing:-.045em;line-height:1.02;}

/* DATA */
.s-data .pad{justify-content:center;}
.data-hero{display:flex;align-items:baseline;gap:16px;margin-bottom:22px;line-height:.85;}
.data-hero .num{font-size:13rem;font-weight:800;letter-spacing:-.05em;}
.data-hero .unit{font-size:3.6rem;font-weight:700;letter-spacing:-.03em;color:var(--muted);}
.datacap{font-size:1.9rem;font-weight:600;letter-spacing:-.025em;line-height:1.25;max-width:74%;}
.src{margin-top:14px;font-size:.73rem;font-weight:500;letter-spacing:.04em;color:var(--subtle);}
.data-items{margin-top:20px;display:flex;flex-direction:column;gap:0;}
.data-items .di{display:flex;align-items:baseline;gap:10px;padding:10px 0;border-top:1px solid var(--border);font-size:.95rem;font-weight:500;color:var(--text);line-height:1.4;}
.data-items .di:last-child{border-bottom:1px solid var(--border);}
.data-items .di .dn{font-size:.62rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;flex-shrink:0;}

/* KEY */
.s-key .pad{justify-content:center;}
.s-key .key-eye{font-size:.7rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:24px;}
.s-key .key-q{font-size:3.2rem;font-weight:800;letter-spacing:-.04em;line-height:1.1;max-width:88%;}
.s-key .key-sub{margin-top:28px;font-size:1.05rem;color:var(--muted);max-width:68%;line-height:1.6;font-weight:400;}

/* PHASES */
.s-phases .pad{justify-content:center;}
.s-phases h2{font-size:1.9rem;font-weight:800;letter-spacing:-.035em;margin-bottom:28px;}
.phases-grid{display:grid;grid-template-columns:repeat(3,1fr);}
.phase{padding:22px 26px;}
.phase+.phase{border-left:1px solid var(--border);}
.ph-label{font-size:.63rem;font-weight:700;letter-spacing:.16em;text-transform:uppercase;margin-bottom:9px;}
.ph-name{font-size:1.6rem;font-weight:700;letter-spacing:-.03em;line-height:1.1;margin-bottom:11px;}
.ph-desc{font-size:.9rem;color:var(--muted);line-height:1.6;}

/* PLATFORM */
.s-platform .pad{justify-content:center;}
.s-platform h2{font-size:1.9rem;font-weight:800;letter-spacing:-.035em;margin-bottom:22px;}
.prows{display:flex;flex-direction:column;}
.prow{display:grid;grid-template-columns:140px 1fr;gap:20px;align-items:start;padding:16px 0;border-top:1px solid var(--border);}
.prow:last-child{border-bottom:1px solid var(--border);}
.ptag{font-size:.62rem;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:var(--muted);line-height:1.5;padding-top:2px;}
.pcontent{display:flex;flex-direction:column;gap:3px;}
.ptitle{font-size:1.15rem;font-weight:700;letter-spacing:-.02em;}
.pdesc{font-size:.86rem;color:var(--muted);line-height:1.55;}
.ptags{margin-top:8px;display:flex;gap:6px;flex-wrap:wrap;}
.ptags span{font-size:.6rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:4px 10px;border-radius:100px;background:var(--surface);border:1px solid var(--border);}

/* COMPARE */
.s-compare .pad{justify-content:center;}
.s-compare h2{font-size:1.85rem;font-weight:800;letter-spacing:-.035em;margin-bottom:22px;}
.compare-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.ccol{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:22px 26px;}
.ccol .ctitle{font-size:.62rem;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-bottom:16px;}
.ccol ul{list-style:none;display:flex;flex-direction:column;gap:11px;}
.ccol ul li{font-size:1.05rem;font-weight:500;display:flex;align-items:flex-start;gap:10px;line-height:1.3;}
.ccol ul li::before{content:'';width:5px;height:5px;border-radius:50%;flex-shrink:0;background:rgba(0,0,0,.22);margin-top:6px;}
.ccol.strong ul li::before{background:var(--orange);}
.cmp-note{margin-top:18px;font-size:.88rem;color:var(--muted);font-style:italic;text-align:center;}

/* STATEMENT */
.s-statement .pad{justify-content:center;}
.s-statement .slabel{font-size:.68rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:20px;}
.s-statement .stmt{font-size:3rem;font-weight:800;letter-spacing:-.04em;line-height:1.1;max-width:88%;}
.s-statement .items{margin-top:32px;display:flex;flex-direction:column;gap:0;}
.s-statement .sitem{display:flex;align-items:baseline;gap:8px;padding:14px 0;border-top:1px solid var(--border);font-size:1.1rem;font-weight:500;color:var(--text);line-height:1.4;}
.s-statement .sitem:last-child{border-bottom:1px solid var(--border);}
.s-statement .sitem .sn{font-size:.63rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;flex-shrink:0;}
.s-statement .snote{margin-top:20px;font-size:.88rem;color:var(--muted);font-style:italic;}

/* INSIGHT */
.s-insight{background:radial-gradient(ellipse at 100% 100%,rgba(124,58,237,.06) 0%,transparent 48%),var(--bg);}
.s-insight .pad{justify-content:center;}
.insight-text{font-size:3.75rem;font-weight:800;letter-spacing:-.045em;line-height:1.08;}
.next-label{margin-top:40px;font-size:.7rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);display:flex;align-items:center;gap:10px;}
.next-label::before{content:'→';color:var(--orange);font-size:.85rem;letter-spacing:0;}

/* NAV */
#ui{
  position:fixed;bottom:10px;left:50%;transform:translateX(-50%);z-index:50;
  display:flex;align-items:center;gap:6px;
  background:rgba(255,255,255,.72);border:1px solid rgba(0,0,0,.1);
  backdrop-filter:blur(16px);padding:4px 10px;border-radius:100px;
  box-shadow:0 2px 10px rgba(0,0,0,.1);
}
#ui button{background:none;border:none;font-size:.85rem;cursor:pointer;opacity:.5;padding:2px 5px;border-radius:6px;color:#111;line-height:1;}
#ui button:hover{opacity:1;background:rgba(0,0,0,.07);}
#counter{font-size:.62rem;color:rgba(0,0,0,.45);font-variant-numeric:tabular-nums;min-width:32px;text-align:center;font-weight:600;}
#hint{position:fixed;top:14px;right:16px;z-index:50;font-size:.68rem;color:rgba(0,0,0,.3);letter-spacing:.04em;}
</style>
</head>
<body>
<div id="hint">← → navegar · F tela cheia</div>
<div id="stage"></div>
<div id="ui">
  <button id="prev">‹</button>
  <span id="counter">1 / 1</span>
  <button id="next">›</button>
</div>
<script>
/* ── Helpers para progressive build ──────────────────────── */
function ph(title, phases, vis) {
  const shown = phases.slice(0, vis);
  return `<div class="pad">
    <h2>${title}</h2>
    <div class="phases-grid" style="grid-template-columns:repeat(${shown.length},1fr)">
      ${shown.map(p => `<div class="phase">
        <div class="ph-label gradtext">${p.label}</div>
        <div class="ph-name">${p.name}</div>
        <div class="ph-desc">${p.desc}</div>
      </div>`).join('')}
    </div>
  </div>`;
}

function plat(title, rows, vis) {
  const shown = rows.slice(0, vis);
  return `<div class="pad">
    <h2>${title}</h2>
    <div class="prows">
      ${shown.map(r => `<div class="prow">
        <div class="ptag">${r.tag}</div>
        <div class="pcontent">
          <div class="ptitle">${r.title}</div>
          <div class="pdesc">${r.desc}</div>
          <div class="ptags">${r.channels.map(c=>`<span>${c}</span>`).join('')}</div>
        </div>
      </div>`).join('')}
    </div>
  </div>`;
}

function stmt(label, big, items, vis, note) {
  const shown = items.slice(0, vis);
  const isLast = vis === items.length;
  return `<div class="pad">
    ${label ? `<div class="slabel">${label}</div>` : ''}
    <div class="stmt">${big}</div>
    ${shown.length ? `<div class="items">
      ${shown.map((it,i) => `<div class="sitem"><span class="sn">0${i+1}</span>${it}</div>`).join('')}
    </div>` : ''}
    ${isLast && note ? `<div class="snote">${note}</div>` : ''}
  </div>`;
}

/* ── Dados dos build slides ───────────────────────────────── */
const jornada = {
  title: 'A jornada que ninguém vê',
  phases: [
    {label:'Início', name:'Gatilho',
     desc:'Uma mudança de vida coloca a decisão em movimento — filho, separação, saída do aluguel. O comprador começa a pesquisar sem saber ainda o que quer.'},
    {label:'Meio', name:'Pesquisa',
     desc:'Meses de busca ativa: bairros, financiamentos, portais, perfis. Ele forma opinião sobre quem sabe do que fala. A fase invisível onde a confiança é construída.'},
    {label:'Fim', name:'Decisão',
     desc:'Pronto para contato. Escolhe 2 a 5 corretores por confiança acumulada — ou por quem responder primeiro quando a mensagem sair.'}
  ]
};

const plataformas = {
  title: 'Onde o comprador está em cada fase',
  rows: [
    {tag:'Começo\n4 meses antes',
     title:'Google — quer aprender, não comprar',
     desc:'11 buscas em média antes de acessar qualquer site imobiliário. Pesquisa financiamento, bairros e o que precisa entender — ainda não procura corretor.',
     channels:['Google','YouTube','Conteúdo']},
    {tag:'Meio\nAfunilando',
     title:'Instagram e portais — construindo referência',
     desc:'64% dos compradores assistem pelo menos um vídeo durante a jornada. Segue quem aparece com consistência e começa a construir preferência.',
     channels:['Instagram','ZAP','Viva Real']},
    {tag:'Fim\nPronto para comprar',
     title:'Contato — a fase que todo corretor disputa',
     desc:'A fase que a maioria dos corretores tenta jogar. As fases anteriores, onde a confiança é construída, ficam sem ninguém presente.',
     channels:['WhatsApp','Formulário','DM']}
  ]
};

const indicacao = {
  label: 'O problema da indicação',
  stmt: 'Para uma indicação acontecer, 3 variáveis precisam se alinhar ao mesmo tempo.',
  items: [
    'Alguém precisa se lembrar de você',
    'Esse alguém precisa conhecer alguém buscando imóvel agora',
    'Esse comprador precisa estar numa fase em que aceita a indicação'
  ],
  note: 'Bom quando acontece. Mas você não controla o timing de nenhuma delas.'
};

/* ── Slides ───────────────────────────────────────────────── */
const slides = [

/* 01 — Capa */
{cls:'s-cover', html:`<div class="pad">
  <div class="eyebrow">Módulo 1 · Aula 2</div>
  <div class="rule"></div>
  <h1>Como o mercado<br>imobiliário funciona<br>no <span class="gradtext">digital</span></h1>
</div>`},

/* 02 — 4 meses */
{cls:'s-data', html:`<div class="pad">
  <div class="data-hero">
    <span class="num gradtext">4</span>
    <span class="unit">meses</span>
  </div>
  <div class="datacap">A jornada do comprador antes do primeiro contato com qualquer corretor.</div>
  <div class="src">DataZAP · Pesquisa com compradores reais, 2024</div>
</div>`},

/* 03 — Você estava lá? */
{cls:'s-key', html:`<div class="pad">
  <div class="key-eye">A pergunta que esse módulo inteiro existe para responder</div>
  <div class="key-q">Durante esses 4 meses, o que esse comprador encontrou quando pesquisou imóvel na sua região?<br><br>Você estava lá?</div>
</div>`},

/* 04 — Jornada: Gatilho */
{cls:'s-phases', html: ph(jornada.title, jornada.phases, 1)},

/* 05 — Jornada: + Pesquisa */
{cls:'s-phases', html: ph(jornada.title, jornada.phases, 2)},

/* 06 — Jornada: completa */
{cls:'s-phases', html: ph(jornada.title, jornada.phases, 3)},

/* 07 — 78% */
{cls:'s-data', html:`<div class="pad">
  <div class="data-hero">
    <span class="num gradtext">78%</span>
  </div>
  <div class="datacap">dos compradores fecham com quem responde primeiro.</div>
  <div class="src">MIT / InsideSales · 100 mil+ tentativas de contato analisadas ao longo de 3 anos</div>
</div>`},

/* 08 — 21x */
{cls:'s-data', html:`<div class="pad">
  <div class="data-hero">
    <span class="num gradtext">21x</span>
  </div>
  <div class="datacap">mais chance de qualificar um lead respondido em menos de 5 minutos.</div>
  <div class="src">vs. leads respondidos após 30 minutos · 69% dos leads de portais não recebem resposta nesse prazo</div>
</div>`},

/* 09 — O jogo tem 2 fases */
{cls:'s-compare', html:`<div class="pad">
  <h2>O jogo tem duas fases.<br>A maioria só joga uma.</h2>
  <div class="compare-grid">
    <div class="ccol">
      <div class="ctitle">Fase 1 — Os 4 meses</div>
      <ul>
        <li>Comprador ainda está pesquisando</li>
        <li>Forma opinião sobre quem sabe do mercado</li>
        <li>Confiança construída por conteúdo consistente</li>
        <li>Quase nenhum corretor está presente aqui</li>
      </ul>
    </div>
    <div class="ccol strong">
      <div class="ctitle">Fase 2 — O momento</div>
      <ul>
        <li>Comprador pronto para contato</li>
        <li>Já escolheu 2 a 3 corretores de confiança</li>
        <li>Fecha com quem responde primeiro</li>
        <li>Todo corretor tenta disputar essa fase</li>
      </ul>
    </div>
  </div>
</div>`},

/* 10 — Plataformas: Começo */
{cls:'s-platform', html: plat(plataformas.title, plataformas.rows, 1)},

/* 11 — Plataformas: + Meio */
{cls:'s-platform', html: plat(plataformas.title, plataformas.rows, 2)},

/* 12 — Plataformas: completa */
{cls:'s-platform', html: plat(plataformas.title, plataformas.rows, 3)},

/* 13 — Problema do portal */
{cls:'s-statement', html:`<div class="pad">
  <div class="slabel">O problema estrutural do portal</div>
  <div class="stmt">O lead que chega até você chegou até todos os outros também.</div>
  <div class="items">
    <div class="sitem"><span class="sn">—</span>Sem relação prévia com o comprador — nenhuma vantagem antes do contato</div>
    <div class="sitem"><span class="sn">—</span>69% dos leads não recebem resposta em menos de 5 minutos</div>
    <div class="sitem"><span class="sn">—</span>R$400–1.000/mês em espaço alugado onde você compete em igualdade de condições</div>
  </div>
</div>`},

/* 14 — Portal vs. Presença */
{cls:'s-compare', html:`<div class="pad">
  <h2>Portal funciona.<br>Mas não como canal principal.</h2>
  <div class="compare-grid">
    <div class="ccol">
      <div class="ctitle">Depender do portal</div>
      <ul>
        <li>Lead comprado e compartilhado com outros corretores</li>
        <li>Sem relação construída antes do contato</li>
        <li>Disputa de velocidade de resposta</li>
        <li>R$4.800–12.000/ano em espaço alugado</li>
      </ul>
    </div>
    <div class="ccol strong">
      <div class="ctitle">Presença digital estratégica</div>
      <ul>
        <li>Lead conquistado ao longo da jornada</li>
        <li>4 meses de confiança antes da primeira mensagem</li>
        <li>Já ganhou antes da conversa começar</li>
        <li>Ativo próprio — não depende de plataforma</li>
      </ul>
    </div>
  </div>
</div>`},

/* 15 — Indicação: var 1 */
{cls:'s-statement', html: stmt(indicacao.label, indicacao.stmt, indicacao.items, 1, indicacao.note)},

/* 16 — Indicação: vars 1+2 */
{cls:'s-statement', html: stmt(indicacao.label, indicacao.stmt, indicacao.items, 2, indicacao.note)},

/* 17 — Indicação: todas 3 */
{cls:'s-statement', html: stmt(indicacao.label, indicacao.stmt, indicacao.items, 3, indicacao.note)},

/* 18 — 580 mil */
{cls:'s-data', html:`<div class="pad">
  <div class="data-hero">
    <span class="num gradtext">580</span>
    <span class="unit">mil</span>
  </div>
  <div class="datacap">corretores registrados no Brasil. +40% em 5 anos. 2º maior do mundo.</div>
  <div class="src">COFECI 2024 · Em 2020 eram 413 mil · Vendas de imóveis novos +11,8% em 2024 (ABRAINC-FIPE)</div>
</div>`},

/* 19 — Corretor vs. Imobiliária */
{cls:'s-compare', html:`<div class="pad">
  <h2>Estratégia digital: corretor vs. imobiliária</h2>
  <div class="compare-grid">
    <div class="ccol">
      <div class="ctitle">Corretor autônomo</div>
      <ul>
        <li>O ativo é você — marca pessoal, autoridade, especialização</li>
        <li>O comprador que te segue te segue, não à empresa</li>
        <li>Ativo que vai com você independente de onde trabalha</li>
      </ul>
    </div>
    <div class="ccol strong">
      <div class="ctitle">Dono de imobiliária</div>
      <ul>
        <li>Dois trabalhos: posicionar a empresa + os corretores</li>
        <li>Marca pessoal do corretor converte mais — tem calor humano</li>
        <li>Imobiliária atrai; corretor converte</li>
      </ul>
    </div>
  </div>
</div>`},

/* 20 — Insight final */
{cls:'s-insight', html:`<div class="pad">
  <div class="insight-text">O trabalho digital<br>não começa quando<br>o lead está pronto.<br><span class="gradtext">Começa 4 meses antes.</span></div>
  <div class="next-label">Próxima aula — quem é esse comprador com precisão</div>
</div>`},

];

/* ── Renderização ─────────────────────────────────────────── */
const stage = document.getElementById('stage');
slides.forEach(s => {
  const el = document.createElement('div');
  el.className = 'slide ' + s.cls;
  el.innerHTML = s.html;
  stage.appendChild(el);
});

const els = [...document.querySelectorAll('.slide')];
let cur = 0;

function show(n) {
  cur = Math.max(0, Math.min(slides.length - 1, n));
  els.forEach((e, i) => e.classList.toggle('active', i === cur));
  document.getElementById('counter').textContent = `${cur + 1} / ${slides.length}`;
}

document.getElementById('next').onclick = () => show(cur + 1);
document.getElementById('prev').onclick = () => show(cur - 1);
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); show(cur + 1); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); show(cur - 1); }
  if (e.key.toLowerCase() === 'f') {
    if (!document.fullscreenElement) document.documentElement.requestFullscreen();
    else document.exitFullscreen();
  }
});
show(0);
</script>
</body>
</html>
